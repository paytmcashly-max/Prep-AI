// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
  ext {
    minSdkVersion = 24
    ndkVersion = "27.3.13750724"
  }

  repositories {
    google()
    mavenCentral()
  }
  dependencies {
    classpath('com.android.tools.build:gradle')
    classpath('com.facebook.react:react-native-gradle-plugin')
    classpath('org.jetbrains.kotlin:kotlin-gradle-plugin')
  }
}

allprojects {
  repositories {
    google()
    mavenCentral()
    maven { url 'https://www.jitpack.io' }
  }
}

subprojects { subproject ->
  subproject.plugins.withId("com.android.library") {
    subproject.androidComponents.finalizeDsl { extension ->
      extension.defaultConfig.minSdk = rootProject.ext.minSdkVersion
    }
    subproject.android.defaultConfig.minSdk = rootProject.ext.minSdkVersion
    subproject.android.defaultConfig.minSdkVersion rootProject.ext.minSdkVersion
    subproject.android.defaultConfig.externalNativeBuild.cmake.arguments "-DANDROID_PLATFORM=android-${rootProject.ext.minSdkVersion}",
      "-DCMAKE_SYSTEM_VERSION=${rootProject.ext.minSdkVersion}",
      "-DCMAKE_ANDROID_API=${rootProject.ext.minSdkVersion}",
      "-DANDROID_NATIVE_API_LEVEL=${rootProject.ext.minSdkVersion}"
  }

  // AGP can still pass API 22 into Prefab for React Native native modules even
  // after minSdk is finalized to 24. Keep the native model aligned for APK builds.
  subproject.tasks.configureEach { task ->
    if (task.name.startsWith("configureCMake")) {
      task.doFirst {
        try {
          def abiField = task.class.superclass.getDeclaredField("abi")
          abiField.accessible = true
          def abi = abiField.get(task)
          def apiField = abi.class.getDeclaredField("abiPlatformVersion")
          apiField.accessible = true
          apiField.set(abi, rootProject.ext.minSdkVersion as int)
        } catch (Throwable ignored) {
          // Some Gradle/CMake tasks do not expose this internal model.
        }
      }
    }
  }
}

apply plugin: "expo-root-project"
apply plugin: "com.facebook.react.rootproject"
